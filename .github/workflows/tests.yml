name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" lifelines scikit-survival "pydantic>=2"
      - run: pytest -q
      - run: python -m mm_tte_survival.cli make-demo-data --out data/demo
      - run: python -m mm_tte_survival.main --config configs/experiments/demo.yaml
